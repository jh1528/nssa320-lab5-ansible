# ==============================================================================
# NSSA320 Lab 5 - Control Node Configuration
# ==============================================================================
#
# Version: 5.0
# Date: 2026-06-26
#
# Purpose:
#   This file is the single source of truth for Lab 5.
#   Scripts source this file so hostnames, IP addresses, gateway, DNS, users,
#   and validation targets are not hardcoded in multiple places.
#
# Lab 5 Focus:
#   - Reuse the Lab 4 Linux Ansible environment.
#   - Add the Windows 11 managed host.
#   - Support WinRM readiness checks from the control node.
#   - Keep checks idempotent so scripts can be safely re-run.
#
# RICE Framework:
#   Reproducibility - One config file defines the lab network.
#   Idempotency     - Scripts compare/check the same desired state every run.
#   Composability   - Other scripts import this file as needed.
#   Evolvability    - Later Lab 5 activities can add checks without rewriting
#                     the base configuration.
#
# Security Note:
#   Do NOT store passwords, GitHub tokens, private SSH keys, or secrets here.
#   Windows passwords should stay in inventory only if required by the lab.
# ==============================================================================


# ------------------------------------------------------------------------------
# Domain and subnet
# ------------------------------------------------------------------------------

DOMAIN="jh1528.com"

NETWORK_CIDR="172.16.5.0/29"
SUBNET_PREFIX="29"
SUBNET_MASK="255.255.255.248"
BROADCAST_IP="172.16.5.7"


# ------------------------------------------------------------------------------
# Gateway / pfSense
# ------------------------------------------------------------------------------

GATEWAY_HOST="gateway"
GATEWAY_IP="172.16.5.6"
GATEWAY_FQDN="${GATEWAY_HOST}.${DOMAIN}"


# ------------------------------------------------------------------------------
# Linux nodes from Lab 4
# ------------------------------------------------------------------------------

CONTROL_HOST="control"
CONTROL_IP="172.16.5.5"
CONTROL_FQDN="${CONTROL_HOST}.${DOMAIN}"

ANSIBLE1_HOST="ansible1"
ANSIBLE1_IP="172.16.5.1"
ANSIBLE1_FQDN="${ANSIBLE1_HOST}.${DOMAIN}"

ANSIBLE2_HOST="ansible2"
ANSIBLE2_IP="172.16.5.2"
ANSIBLE2_FQDN="${ANSIBLE2_HOST}.${DOMAIN}"

UBUNTU_HOST="ubuntu"
UBUNTU_IP="172.16.5.3"
UBUNTU_FQDN="${UBUNTU_HOST}.${DOMAIN}"


# ------------------------------------------------------------------------------
# Windows 11 managed host for Lab 5
# ------------------------------------------------------------------------------

WIN11_HOST="win11"
WIN11_IP="172.16.5.4"
WIN11_FQDN="${WIN11_HOST}.${DOMAIN}"


# ------------------------------------------------------------------------------
# DNS
# ------------------------------------------------------------------------------
#
# Local lab hostnames are resolved with /etc/hosts.
# DNS here is only for external internet name resolution.
# ------------------------------------------------------------------------------

DNS_SERVERS="8.8.8.8 1.1.1.1"


# ------------------------------------------------------------------------------
# Users
# ------------------------------------------------------------------------------

LAB_USER="student"
ANSIBLE_SERVICE_USER="ansible"


# ------------------------------------------------------------------------------
# WinRM settings for Windows 11
# ------------------------------------------------------------------------------
#
# These values are used for checking/planning only.
# Do not store the Windows ansible password here.
# ------------------------------------------------------------------------------

WINRM_PORT="5985"
WINRM_TRANSPORT="ntlm"
WINRM_SCHEME="http"


# ------------------------------------------------------------------------------
# Lab 5 validation targets
# ------------------------------------------------------------------------------
#
# These names should resolve through /etc/hosts.
# The control node check script can ping these targets safely every run.
# ------------------------------------------------------------------------------

PING_TARGETS="gateway control ansible1 ansible2 ubuntu win11"

LINUX_TARGETS="control ansible1 ansible2 ubuntu"
WINDOWS_TARGETS="win11"
ANSIBLE_TARGETS="ansible1 ansible2 ubuntu win11"
